# Used by Markdownlint tool
# Reference: https://github.com/DavidAnson/markdownlint

heading-style: atx
blanks-around-fences:
  list-items: false
blanks-around-headings: false
blanks-around-lists: false
MD032: false
first-line-heading: true
line-length: false
table-column-style: false
list-marker-space:
  ol_multi: 1
  ol_single: 1
  ul_multi: 1
  ul_single: 1
no-duplicate-heading:
  siblings_only: true
no-inline-html:
  allowed-elements:
    - "a"
    - "br"
    - "code"
no-trailing-spaces: true
ol-prefix:
  style: "ordered"
ul-indent:
  indent: 2
ul-style:
  style: "dash"

